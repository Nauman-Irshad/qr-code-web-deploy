<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Smart Fitao · Phone photo</title>
  <style>
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      height: 100dvh;
      overflow: hidden;
      background: #000;
      color: #fff;
      font-family: system-ui, -apple-system, Segoe UI, sans-serif;
      touch-action: manipulation;
    }
    #wrap {
      width: 100%;
      height: 100%;
      height: 100dvh;
    }
    /* Full-screen camera shell */
    #camera {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      background: #000;
      overflow: hidden;
    }
    #camera[hidden] { display: none !important; }
    .stage {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      background: #000;
      overflow: hidden;
    }
    video, .preview {
      position: absolute;
      top: 50%;
      left: 50%;
      min-width: 100%;
      min-height: 100%;
      width: auto;
      height: auto;
      transform: translate(-50%, -50%);
      object-fit: cover;
    }
    video.mirror {
      transform: translate(-50%, -50%) scaleX(-1);
    }
    .hint {
      position: absolute;
      top: calc(max(12px, env(safe-area-inset-top)) + 78px);
      left: 50%;
      transform: translateX(-50%);
      z-index: 5;
      max-width: 92%;
      text-align: center;
      background: rgba(0,0,0,.55);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      padding: 10px 16px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 600;
      line-height: 1.35;
    }
    .bar {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 8;
      display: flex;
      gap: 12px;
      justify-content: center;
      align-items: center;
      padding: 20px 16px calc(20px + env(safe-area-inset-bottom));
      background: linear-gradient(to top, rgba(0,0,0,.82) 0%, rgba(0,0,0,.35) 65%, transparent 100%);
      border: none;
    }
    button {
      border: none;
      border-radius: 999px;
      padding: 16px 32px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
    }
    .primary {
      background: #059669;
      color: #fff;
      min-width: 180px;
      box-shadow: 0 4px 20px rgba(5,150,105,.45);
    }
    .primary.capture-ready {
      min-width: 72px;
      min-height: 72px;
      width: 72px;
      height: 72px;
      padding: 0;
      border-radius: 50%;
      border: 4px solid #fff;
      background: rgba(255,255,255,.25);
      box-shadow: 0 0 0 3px rgba(5,150,105,.9);
    }
    .primary:disabled { opacity: .45; cursor: not-allowed; }
    .ghost {
      background: rgba(255,255,255,.18);
      color: #fff;
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
    }
    .err, .ok {
      position: absolute;
      bottom: calc(100px + env(safe-area-inset-bottom));
      left: 16px;
      right: 16px;
      z-index: 6;
      padding: 12px 14px;
      border-radius: 12px;
      font-size: 14px;
      text-align: center;
    }
    .err { background: rgba(220,38,38,.92); }
    .ok { background: rgba(5,150,105,.92); }
    .loading {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      background: rgba(0,0,0,.55);
      z-index: 4;
      font-weight: 600;
    }
    .landing {
      min-height: 100dvh;
      padding: 32px 20px;
      padding-top: max(32px, env(safe-area-inset-top));
      text-align: center;
      max-width: 420px;
      margin: auto;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }
    .landing h1 { font-size: 1.35rem; margin: 0 0 12px; }
    .landing p { color: #aaa; line-height: 1.55; font-size: 15px; }
    .brand-bar {
      position: absolute;
      top: max(10px, env(safe-area-inset-top));
      left: 50%;
      transform: translateX(-50%);
      z-index: 9;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      width: min(92%, 320px);
      pointer-events: none;
    }
    .brand-bar img {
      width: 52px;
      height: 52px;
      border-radius: 12px;
      object-fit: cover;
      box-shadow: 0 4px 18px rgba(0,0,0,.35);
    }
    .brand-bar .scan-title {
      margin: 0;
      padding: 6px 14px;
      border-radius: 999px;
      background: rgba(0,0,0,.62);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      font-size: 12px;
      font-weight: 800;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: #fff;
    }
    .landing-logo {
      width: 72px;
      height: 72px;
      border-radius: 14px;
      object-fit: cover;
      margin: 0 auto 14px;
      display: block;
      box-shadow: 0 6px 24px rgba(5,150,105,.25);
    }
    .logo { color: #059669; font-weight: 800; letter-spacing: .04em; font-size: 13px; }
  </style>
</head>
<body>
  <div id="wrap">
    <div id="landing" class="landing" hidden>
      <img src="smartfitao-logo.png" alt="SmartFitao AI" class="landing-logo" />
      <p class="logo">SMART FITAO AI</p>
      <h1>Scan QR code</h1>
      <p>
        On your computer, open <strong>2D Try-On</strong> and tap <strong>Scan QR code</strong>.
        Scan that QR with your phone — this page opens so you can take a full-body shalwar kameez photo.
      </p>
    </div>
    <div id="camera" hidden>
      <div class="stage">
        <div class="brand-bar">
          <img src="smartfitao-logo.png" alt="SmartFitao AI" />
          <p class="scan-title">Scan QR code</p>
        </div>
        <video id="video" playsinline muted autoplay></video>
        <img id="preview" class="preview" alt="" hidden />
        <div class="hint" id="hint">Wear shalwar kameez · full body · tap Capture</div>
        <div id="loading" class="loading" hidden>Starting camera…</div>
        <div id="err" class="err" hidden></div>
        <div id="ok" class="ok" hidden></div>
      </div>
      <div class="bar">
        <button type="button" class="ghost" id="retakeBtn" hidden>Retake</button>
        <button type="button" class="primary" id="actionBtn" disabled>Open camera</button>
      </div>
    </div>
  </div>
  <canvas id="canvas" hidden></canvas>
  <script>
    (function () {
      var params = new URLSearchParams(location.search);
      var phoneSession = params.get('phone_session') || params.get('session') || '';

      var landing = document.getElementById('landing');
      var camera = document.getElementById('camera');
      var video = document.getElementById('video');
      var preview = document.getElementById('preview');
      var canvas = document.getElementById('canvas');
      var actionBtn = document.getElementById('actionBtn');
      var retakeBtn = document.getElementById('retakeBtn');
      var loading = document.getElementById('loading');
      var errEl = document.getElementById('err');
      var okEl = document.getElementById('ok');
      var hint = document.getElementById('hint');

      var stream = null;
      var capturedDataUrl = null;
      var busy = false;

      if (!phoneSession) {
        landing.hidden = false;
        return;
      }

      camera.hidden = false;

      function showErr(msg) {
        errEl.textContent = msg;
        errEl.hidden = !msg;
      }
      function showOk(msg) {
        okEl.textContent = msg;
        okEl.hidden = !msg;
      }

      async function stopCamera() {
        if (stream) {
          stream.getTracks().forEach(function (t) { t.stop(); });
          stream = null;
        }
        video.hidden = false;
        preview.hidden = true;
      }

      async function startCamera() {
        showErr('');
        showOk('');
        loading.hidden = false;
        actionBtn.disabled = true;
        actionBtn.classList.remove('capture-ready');
        actionBtn.textContent = 'Open camera';
        try {
          var constraints = {
            video: {
              facingMode: { ideal: 'environment' },
              width: { ideal: 1920 },
              height: { ideal: 1080 },
            },
            audio: false,
          };
          try {
            stream = await navigator.mediaDevices.getUserMedia(constraints);
          } catch (e1) {
            stream = await navigator.mediaDevices.getUserMedia({
              video: { facingMode: { ideal: 'environment' } },
              audio: false,
            });
          }
          video.srcObject = stream;
          video.setAttribute('playsinline', '');
          video.setAttribute('webkit-playsinline', '');
          var track = stream.getVideoTracks()[0];
          var facing = track && track.getSettings ? track.getSettings().facingMode : '';
          video.classList.toggle('mirror', facing === 'user');
          await video.play();
          actionBtn.textContent = '';
          actionBtn.classList.add('capture-ready');
          actionBtn.setAttribute('aria-label', 'Capture photo');
          actionBtn.disabled = false;
          hint.textContent = 'Full body in frame · tap the circle to capture';
        } catch (e) {
          showErr('Allow camera access in browser settings, then tap Retry.');
          actionBtn.textContent = 'Retry camera';
          actionBtn.classList.remove('capture-ready');
          actionBtn.disabled = false;
        } finally {
          loading.hidden = true;
        }
      }

      function takePhoto() {
        var w = video.videoWidth || 720;
        var h = video.videoHeight || 1280;
        canvas.width = w;
        canvas.height = h;
        var ctx = canvas.getContext('2d');
        if (video.classList.contains('mirror')) {
          ctx.translate(w, 0);
          ctx.scale(-1, 1);
        }
        ctx.drawImage(video, 0, 0, w, h);
        capturedDataUrl = canvas.toDataURL('image/jpeg', 0.9);
        preview.src = capturedDataUrl;
        preview.hidden = false;
        video.hidden = true;
        stopCamera();
        retakeBtn.hidden = false;
        actionBtn.classList.remove('capture-ready');
        actionBtn.textContent = 'Send to website';
        actionBtn.removeAttribute('aria-label');
        sendPhoto();
      }

      async function compressDataUrl(dataUrl, maxWidth) {
        return new Promise(function (resolve) {
          var img = new Image();
          img.onload = function () {
            var w = img.width;
            var h = img.height;
            if (w > maxWidth) {
              h = Math.round(h * (maxWidth / w));
              w = maxWidth;
            }
            var c = document.createElement('canvas');
            c.width = w;
            c.height = h;
            c.getContext('2d').drawImage(img, 0, 0, w, h);
            resolve(c.toDataURL('image/jpeg', 0.82));
          };
          img.onerror = function () { resolve(dataUrl); };
          img.src = dataUrl;
        });
      }

      async function dataUrlToBlob(dataUrl) {
        var res = await fetch(dataUrl);
        return res.blob();
      }

      async function saveToApi(sessionId, dataUrl) {
        var compressed = await compressDataUrl(dataUrl, 960);
        var blob = await dataUrlToBlob(compressed);
        var fd = new FormData();
        fd.append('photo', blob, 'phone-photo.jpg');
        var uploadUrl = new URL(
          '/api/sessions/' + encodeURIComponent(sessionId) + '/photo',
          location.origin
        ).toString();
        var res = await fetch(uploadUrl, { method: 'POST', body: fd });
        if (!res.ok) {
          var errText = '';
          try { errText = await res.text(); } catch (e) {}
          throw new Error('Upload failed (' + res.status + '). ' + (errText || 'Set BLOB_READ_WRITE_TOKEN on Vercel.'));
        }
      }

      async function saveToFirestore(sessionId, dataUrl) {
        var compressed = await compressDataUrl(dataUrl, 960);
        var apiKey = 'AIzaSyBjYPdRnwuRSAfTZDZ9fkS-f7hDQccOjOY';
        var projectId = 'smart-fitao-web-app';
        var url = 'https://firestore.googleapis.com/v1/projects/' + projectId +
          '/databases/(default)/documents/phone_tryon_sync/' + sessionId + '?key=' + apiKey;
        var res = await fetch(url, {
          method: 'PATCH',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            fields: {
              imageDataUrl: { stringValue: compressed },
              updatedAt: { stringValue: new Date().toISOString() },
            },
          }),
        });
        if (!res.ok) {
          throw new Error('Could not save photo. Enable Firestore rules for phone_tryon_sync.');
        }
      }

      async function sendPhoto() {
        if (!capturedDataUrl || busy) return;
        busy = true;
        actionBtn.disabled = true;
        retakeBtn.disabled = true;
        showErr('');
        showOk('Sending to website…');

        try {
          try {
            await saveToApi(phoneSession, capturedDataUrl);
          } catch (apiErr) {
            await saveToFirestore(phoneSession, capturedDataUrl);
          }
          showOk('Done! Go back to your computer — photo will appear on try-on.');
          actionBtn.textContent = 'Sent ✓';
        } catch (e) {
          showErr(e.message || 'Could not send photo.');
          actionBtn.disabled = false;
          retakeBtn.disabled = false;
          actionBtn.classList.remove('capture-ready');
          actionBtn.textContent = 'Send to website';
        } finally {
          busy = false;
        }
      }

      async function retake() {
        capturedDataUrl = null;
        retakeBtn.hidden = true;
        showOk('');
        showErr('');
        busy = false;
        await startCamera();
      }

      actionBtn.addEventListener('click', function () {
        if (!stream && !capturedDataUrl) {
          startCamera();
          return;
        }
        if (!capturedDataUrl) {
          takePhoto();
        } else if (!busy) {
          sendPhoto();
        }
      });
      retakeBtn.addEventListener('click', retake);

      startCamera();
    })();
  </script>
</body>
</html>
